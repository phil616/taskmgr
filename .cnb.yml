main:

  push:
    # ── 前端：构建 + 部署到 EdgeOne Pages ──
    - name: 前端部署
      docker:
        image: node:20
        volumes:
          - /root/.npm
      ifModify:
        - "ops-timer-frontend/**"
      stages:
        - name: 安装依赖
          script: |
            cd ops-timer-frontend
            npm ci

        - name: 构建打包
          script: |
            cd ops-timer-frontend
            echo "VITE_API_BASE_URL=https://countdown-api.dreamreflex.com/api/v1" > .env.production
            echo "VITE_COMMIT_SHA=${CNB_COMMIT}" >> .env.production
            npm run build

        - name: Deploy to EdgeOne Pages
          imports:
            - https://cnb.cool/greenshadecapital/dreamreflex/assets-secrets/-/blob/main/api-server.yml
          script: npx edgeone pages deploy ./ops-timer-frontend/dist/ -n dreamreflex-countdown -t $EDGEONE_API_TOKEN

        - name: 构建成功通知
          image: cnbcool/webhook
          imports:
            - https://cnb.cool/greenshadecapital/dreamreflex/assets-secrets/-/blob/main/api-server.yml
          settings:
            urls:
              - https://api.dreamreflex.com/api/email/send-common
            method: POST
            content_type: application/json
            template: |
              {
                "title": "前端构建部署成功",
                "content": "仓库{{ CNB_REPO_SLUG }}前端构建成功，URL：{{ CNB_REPO_URL_HTTPS }}",
                "message_id": "{{ CNB_BRANCH_SHA }}",
                "recipients": ["phil616@163.com"]
              }
            headers:
              - "x-api-key=${UPLOAD_API_KEY}"
            valid_response_codes: [200, 201, 204]
            skip_verify: false
            debug: true

    # ── 后端：Docker 构建 + 部署到 S2 ──
    - services:
        - docker
      imports: https://cnb.cool/greenshadecapital/dreamreflex/devops-server-secrets/-/blob/main/s2-server.yml
      stages:
        - name: docker login
          script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}

        - name: docker build
          script: |
            docker build \
              -f ops-timer-backend/Dockerfile \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:prod \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${CNB_COMMIT} \
              ops-timer-backend/

        - name: docker push
          script: |
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:prod
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${CNB_COMMIT}

        - name: 通过 ssh 部署后端
          image: tencentcom/ssh
          settings:
            host:
              - ${S2_IP}
            username: ${S2_SSH_USER}
            key: ${S2_SSH_PVKEY}
            port: ${S2_SSH_PORT}
            command_timeout: 2m
            script: |
              set -euo pipefail
              cd /root/
              docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}

              mkdir -p /root/ops-timer-data

              docker stop ops-task-manager || true
              docker rm   ops-task-manager || true

              docker run -d --network host --name ops-task-manager \
                --pull=always \
                --restart unless-stopped \
                -v /root/ops-timer-data:/app/data \
                -e TASK_MANAGER_SERVER_HOST=0.0.0.0 \
                -e TASK_MANAGER_SERVER_PORT=5003 \
                -e TASK_MANAGER_SERVER_CORS_ORIGINS="${DEVOPS_OPS_TIMER_CORS_ORIGINS}" \
                -e TASK_MANAGER_DATABASE_DRIVER=sqlite \
                -e TASK_MANAGER_DATABASE_DSN=./data/task_manager.db \
                -e TASK_MANAGER_AUTH_JWT_SECRET="${DEVOPS_OPS_TIMER_JWT_SECRET}" \
                -e TASK_MANAGER_AUTH_JWT_EXPIRY_HOURS=24 \
                -e TASK_MANAGER_MCP_ENABLED=true \
                -e TASK_MANAGER_MCP_PATH=/mcp \
                -e TASK_MANAGER_SMTP_HOST="${DEVOPS_OPS_TIMER_SMTP_HOST}" \
                -e TASK_MANAGER_SMTP_PORT=587 \
                -e TASK_MANAGER_SMTP_USERNAME="${DEVOPS_OPS_TIMER_SMTP_USERNAME}" \
                -e TASK_MANAGER_SMTP_PASSWORD="${DEVOPS_OPS_TIMER_SMTP_PASSWORD}" \
                -e TASK_MANAGER_SMTP_FROM="${DEVOPS_OPS_TIMER_SMTP_FROM}" \
                -e TASK_MANAGER_LOG_LEVEL=info \
                -e TASK_MANAGER_LOG_FORMAT=json \
                ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:prod

              repo="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
              running_img_id="\$(docker inspect -f '{{.Image}}' ops-task-manager || true)"
              docker images "\${repo}" -q | grep -v "\${running_img_id#sha256:}" | xargs -r docker rmi -f || true
              docker image prune -f || true
              
$:
  # 自动生成的CodeWiki
  tag_push:
    - services:
        - docker
      docker:
        volumes:
          - /data/codewiki/${CNB_REPO_SLUG}:data
      stages:
        - name: 生成 Code Wiki
          # 当仓库比较大时，codewiki 用时会超过流水线默认的1小时，导致流水线自动结束。所以手动指定流水线超时时间
          timeout: 2h
          image: cnbcool/codewiki:latest
          settings:
            git_doc_dir: /data/codewiki/${CNB_REPO_SLUG}

        - name: 发送CodeWiki数据
          imports:
            - https://cnb.cool/greenshadecapital/dreamreflex/assets-secrets/-/blob/main/api-server.yml
          script: |
            tar -C /data/codewiki/${CNB_REPO_SLUG} -czf - . \
            | curl --fail --retry 3 \
                -H "X-API-Key: ${UPLOAD_API_KEY}" \
                --upload-file - \
                https://api.dreamreflex.com/api/upload/dir-$(date +%F).tar.gz