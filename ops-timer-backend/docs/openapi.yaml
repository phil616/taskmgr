openapi: 3.0.3
info:
  title: 运维任务管理系统 API
  description: |
    面向运维场景的任务、日程、项目、待办与通知管理 REST API。

    ## 认证
    - **JWT**：在请求头添加 `Authorization: Bearer <token>`，`token` 由 `POST /api/v1/auth/login` 获得。
    - **API Token**：在请求头添加 `X-API-Token: <api_token>`，适用于脚本与第三方集成（见 `GET /api/v1/auth/token`）。

    ## 统一响应体
    除 `204 No Content` 及少数裸 JSON 外，成功响应体为：
    ```json
    { "code": 0, "message": "success", "data": { ... } }
    ```
    分页列表额外包含 `meta`：`page`、`page_size`、`total`、`total_pages`。

    ## 业务错误码（`code` 字段）
    | code | 说明 |
    |------|------|
    | 0 | 成功 |
    | 40001 | 参数校验失败 |
    | 40101 | 认证缺失 |
    | 40102 | Token 无效 |
    | 40103 | 凭据错误 |
    | 40104 | 登录锁定（限流） |
    | 40401 | 资源不存在 |
    | 42201 | 业务规则错误 |
    | 50001 | 服务器内部错误 |
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: "{baseUrl}"
    variables:
      baseUrl:
        default: http://localhost:8080
        description: 服务根地址（不含尾部斜杠）

tags:
  - name: Health
    description: 健康检查（无需认证）
  - name: Auth
    description: 账号登录、资料与 API Token
  - name: Units
    description: 计时单元（倒计时/正计时/计数等）
  - name: Projects
    description: 项目聚合
  - name: Todos
    description: 待办事项
  - name: TodoGroups
    description: 待办分组
  - name: Notifications
    description: 系统通知
  - name: Schedules
    description: 日程管理（含关联资源）
  - name: Wallets
    description: 钱包/账户管理
  - name: BudgetCategories
    description: 收支分类
  - name: Transactions
    description: 收支记录
  - name: BudgetStats
    description: 预算统计汇总
  - name: MCP
    description: MCP（Model Context Protocol）AI 智能体接入

paths:
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      operationId: healthCheck
      responses:
        "200":
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccess"
              examples:
                ok:
                  value:
                    code: 0
                    message: success
                    data:
                      status: ok

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 用户名密码登录
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功，返回 JWT 与用户信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedCredential"
        "429":
          $ref: "#/components/responses/TooManyRequestsLoginLock"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 登出（使当前 JWT 失效）
      operationId: authLogout
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/profile:
    get:
      tags: [Auth]
      summary: 获取当前用户资料
      operationId: authGetProfile
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Auth]
      summary: 更新当前用户资料
      operationId: authUpdateProfile
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/password:
    put:
      tags: [Auth]
      summary: 修改密码
      operationId: authChangePassword
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: 成功，`data` 可为 null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedCredential"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/token:
    get:
      tags: [Auth]
      summary: 获取当前用户的 API Token（明文）
      operationId: authGetApiToken
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/token/regenerate:
    post:
      tags: [Auth]
      summary: 重新生成 API Token（旧 Token 立即失效）
      operationId: authRegenerateApiToken
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/test-email:
    post:
      tags: [Auth]
      summary: 发送测试邮件到当前用户邮箱（需配置 SMTP）
      operationId: authTestEmail
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: 发送成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/BusinessError"

  /api/v1/auth/smtp-status:
    get:
      tags: [Auth]
      summary: 查询 SMTP 是否已配置
      operationId: authSmtpStatus
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: OK，`data.enabled` 为布尔值
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/units:
    get:
      tags: [Units]
      summary: 分页查询计时单元列表
      operationId: unitsList
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/unitQueryType"
        - $ref: "#/components/parameters/unitQueryStatus"
        - $ref: "#/components/parameters/unitQueryProjectId"
        - $ref: "#/components/parameters/unitQueryTags"
        - $ref: "#/components/parameters/unitQueryPriority"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
        - $ref: "#/components/parameters/queryQ"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccessWithMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/UnitResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Units]
      summary: 创建计时单元
      operationId: unitsCreate
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUnitRequest"
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UnitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/BusinessError"

  /api/v1/units/summary:
    get:
      tags: [Units]
      summary: 计时单元统计摘要
      operationId: unitsSummary
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UnitSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/units/{id}:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [Units]
      summary: 获取单个计时单元
      operationId: unitsGet
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UnitResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Units]
      summary: 全量更新计时单元
      operationId: unitsPut
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUnitRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UnitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessError"
    patch:
      tags: [Units]
      summary: 部分更新计时单元（与 PUT 语义相同，仅提交需修改字段）
      operationId: unitsPatch
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUnitRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UnitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessError"
    delete:
      tags: [Units]
      summary: 删除计时单元
      operationId: unitsDelete
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "204":
          description: 删除成功，无响应体
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/units/{id}/status:
    patch:
      tags: [Units]
      summary: 更新计时单元状态
      operationId: unitsUpdateStatus
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUnitStatusRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UnitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/units/{id}/step:
    post:
      tags: [Units]
      summary: 计数类单元步进（上/下）
      operationId: unitsStep
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StepRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UnitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessError"

  /api/v1/units/{id}/value:
    put:
      tags: [Units]
      summary: 直接设置计数类单元当前值
      operationId: unitsSetValue
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetValueRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UnitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessError"

  /api/v1/units/{id}/logs:
    get:
      tags: [Units]
      summary: 分页查询单元操作日志
      operationId: unitsGetLogs
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccessWithMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/UnitLogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects:
    get:
      tags: [Projects]
      summary: 分页查询项目列表
      operationId: projectsList
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed, archived]
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccessWithMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProjectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Projects]
      summary: 创建项目
      operationId: projectsCreate
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/projects/{id}:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [Projects]
      summary: 获取项目详情
      operationId: projectsGet
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProjectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Projects]
      summary: 更新项目
      operationId: projectsPut
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Projects]
      summary: 部分更新项目
      operationId: projectsPatch
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Projects]
      summary: 删除项目
      operationId: projectsDelete
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "204":
          description: 删除成功，无响应体
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{id}/units:
    get:
      tags: [Projects]
      summary: 分页查询某项目下的计时单元
      operationId: projectsGetUnits
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccessWithMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/UnitResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/todos:
    get:
      tags: [Todos]
      summary: 分页查询待办列表
      operationId: todosList
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, done, cancelled]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, normal, high, critical]
        - name: group_id
          in: query
          schema:
            type: string
        - name: due_date
          in: query
          description: 筛选条件（格式由服务端解析）
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeSuccessWithMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TodoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Todos]
      summary: 创建待办
      operationId: todosCreate
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
